name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Download fonts
        run: |
          mkdir -p public/fonts
          # Inter
          curl -L "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip" -o /tmp/inter.zip
          unzip -j /tmp/inter.zip "InterVariable/InterVariable.ttf" -d public/fonts/ 2>/dev/null || \
          unzip -j /tmp/inter.zip "*.ttf" -d /tmp/inter-fonts/ && \
          cp /tmp/inter-fonts/Inter-Regular.ttf public/fonts/ 2>/dev/null || true
          # Fallback: download individual files from Google Fonts CDN mirror
          # (replace with your preferred font hosting in production)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (PDF + web)
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
